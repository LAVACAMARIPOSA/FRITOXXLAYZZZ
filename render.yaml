services:
  - type: worker
    name: solana-zero-capital-beast
    env: rust
    buildCommand: cargo build --release
    startCommand: ./target/release/solana-zero-capital-beast
    envVars:
      - key: SOLANA_KEYPAIR_JSON
        sync: false
      - key: RUST_LOG
        value: info
        sync: false
      - key: RPC_URL
        sync: false