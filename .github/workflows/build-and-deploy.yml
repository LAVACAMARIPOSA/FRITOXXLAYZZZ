name: Build and Deploy to HuggingFace

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Deploy to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir deploy && cd deploy

          # Init git with LFS for binary files
          git init -b main
          git lfs install
          git lfs track "bot"

          # Copy binary
          cp ../target/release/solana-zero-capital-beast bot

          # Minimal Dockerfile (no compilation needed)
          cat > Dockerfile <<'EOF'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
          COPY bot /app/bot
          RUN chmod +x /app/bot && mkdir -p /app/data
          WORKDIR /app
          EXPOSE 7860
          CMD ["./bot"]
          EOF

          # HF Space metadata
          cat > README.md <<'EOF'
          ---
          title: FRITOXXLAYZZZ
          emoji: "⚡"
          colorFrom: purple
          colorTo: blue
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Solana Zero-Capital Beast v2.0
          EOF

          git config user.name "CI"
          git config user.email "ci@bot"
          git add -A
          git commit -m "deploy ${{ github.sha }}"
          git push --force https://Xxvelonxx:${HF_TOKEN}@huggingface.co/spaces/Xxvelonxx/FRITOXXLAYZZZ main
