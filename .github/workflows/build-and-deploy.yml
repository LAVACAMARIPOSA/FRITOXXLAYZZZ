name: Build and Deploy to HuggingFace

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Prepare deploy package
        run: |
          mkdir -p deploy/src deploy/data
          cp target/release/solana-zero-capital-beast deploy/bot
          # Simple Dockerfile that just copies the prebuilt binary
          cat > deploy/Dockerfile << 'DEOF'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
          COPY bot /app/bot
          RUN chmod +x /app/bot && mkdir -p /app/data
          WORKDIR /app
          EXPOSE 7860
          CMD ["./bot"]
          DEOF
          # HF Space README with metadata
          cat > deploy/README.md << 'REOF'
          ---
          title: FRITOXXLAYZZZ
          emoji: "⚡"
          colorFrom: purple
          colorTo: blue
          sdk: docker
          app_port: 7860
          pinned: false
          ---
          # Solana Zero-Capital Beast v2.0
          Autonomous DeFi agent with persistent memory.
          REOF

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy build ${{ github.sha }}"
          git push --force https://Xxvelonxx:${HF_TOKEN}@huggingface.co/spaces/Xxvelonxx/FRITOXXLAYZZZ main
